<h1>Carrello</h1>

{% if items %}
<table>
    <thead>
        <tr>
            <th>Prodotto</th>
            <th>Quantità</th>
            <th>Prezzo</th>
            <th>Subtotale</th>
            <th>Rimuovi</th>
        </tr>
    </thead>
    <tbody>
        {% for item in items %}
        <tr>
            <td>{{ item.product.name }}</td>
            <td>{{ item.quantity }}</td>
            <td>{{ item.product.price }}</td>
            <td>{{ item.get_subtotal }}</td>
            <td>
                <a href="{% url 'remove_from_cart' item.pk %}">Rimuovi</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

<p>Totale: {{ total }}</p>
<a href="{% url 'checkout' %}">Procedi al checkout</a>

{% else %}
<p>Il carrello è vuoto</p>
{% endif %}
